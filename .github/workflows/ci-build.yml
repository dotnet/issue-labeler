# CI Build and Test of the IssueLabeler solution
name: "CI Build"

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci-*.yml"
      - "IssueLabeler/**"

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: "Set up the .NET SDK"
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x

      - name: "Build the IssueLabeler solution"
        run: dotnet build IssueLabeler/ --configuration Release

      - name: "Run tests from the IssueLabeler solution"
        run: dotnet test IssueLabeler/ --configuration Release --no-build
