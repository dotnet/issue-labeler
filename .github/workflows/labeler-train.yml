# Train the Issues, Pull Requests, and Discussions models for label prediction
name: "Labeler: Training"

on:
  workflow_dispatch:
    inputs:
      type:
        description: "Issues, Pull Requests, or Discussions"
        type: choice
        required: true
        default: "All"
        options:
          - "All"
          - "Issues"
          - "Pull Requests"
          - "Discussions"

      steps:
        description: "Training Steps"
        type: choice
        required: true
        default: "All"
        options:
          - "All"
          - "Download Data"
          - "Train Model"
          - "Test Model"

      repository:
        description: "The org/repo to download data from. Defaults to the current repository."
      limit:
        description: "Max number of items to download for training/testing the model (newest items are used). Defaults to the max number of pages times the page size."
        type: number
      page_size:
        description: "Number of items per page in GitHub API requests. Defaults to 100 for issues, 25 for pull requests."
        type: number
      page_limit:
        description: "Maximum number of pages to download for training/testing the model. Defaults to 1000 for issues, 4000 for pull requests."
        type: number
      cache_key_suffix:
        description: "The cache key suffix to use for staged data/models (use 'ACTIVE' to bypass staging). Defaults to 'staged'."
        required: true
        default: "staged"

permissions: {}

env:
  CACHE_KEY: ${{ github.event.inputs.cache_key_suffix }}
  REPOSITORY: ${{ github.event.inputs.repository || github.repository }}
  LABEL_PREFIX: "area-"
  THRESHOLD_ISSUES: ${{ vars.ISSUE_LABELER_PREDICTION_THRESHOLD_ISSUES || vars.ISSUE_LABELER_PREDICTION_THRESHOLD || '0.15' }}
  THRESHOLD_PULLS: ${{ vars.ISSUE_LABELER_PREDICTION_THRESHOLD_PULLS || vars.ISSUE_LABELER_PREDICTION_THRESHOLD || '0.15' }}
  THRESHOLD_DISCUSSIONS: ${{ vars.ISSUE_LABELER_PREDICTION_THRESHOLD_DISCUSSIONS || vars.ISSUE_LABELER_PREDICTION_THRESHOLD || '0.15' }}
  LIMIT: ${{ github.event.inputs.limit }}
  PAGE_SIZE: ${{ github.event.inputs.page_size }}
  PAGE_LIMIT: ${{ github.event.inputs.page_limit }}

jobs:
  download-issues:
    if: ${{ contains(fromJSON('["All", "Issues"]'), github.event.inputs.type) && contains(fromJSON('["All", "Download Data"]'), github.event.inputs.steps) }}
    runs-on: ubuntu-latest
    permissions:
      issues: read
    steps:
      - name: "Download Issues"
        uses: dotnet/issue-labeler/download@98f1d9b85686147ffdc155547cdd3469546c4e26 # v2.1.0
        with:
          type: "issues"
          cache_key: ${{ env.CACHE_KEY }}
          repository: ${{ env.REPOSITORY }}
          label_prefix: ${{ env.LABEL_PREFIX }}
          limit: ${{ env.LIMIT }}
          page_size: ${{ env.PAGE_SIZE }}
          page_limit: ${{ env.PAGE_LIMIT }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

  download-pulls:
    if: ${{ contains(fromJSON('["All", "Pull Requests"]'), github.event.inputs.type) && contains(fromJSON('["All", "Download Data"]'), github.event.inputs.steps) }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: "Download Pull Requests"
        uses: dotnet/issue-labeler/download@98f1d9b85686147ffdc155547cdd3469546c4e26 # v2.1.0
        with:
          type: "pulls"
          cache_key: ${{ env.CACHE_KEY }}
          repository: ${{ env.REPOSITORY }}
          label_prefix: ${{ env.LABEL_PREFIX }}
          limit: ${{ env.LIMIT }}
          page_size: ${{ env.PAGE_SIZE }}
          page_limit: ${{ env.PAGE_LIMIT }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

  download-discussions:
    if: ${{ contains(fromJSON('["All", "Discussions"]'), github.event.inputs.type) && contains(fromJSON('["All", "Download Data"]'), github.event.inputs.steps) }}
    runs-on: ubuntu-latest
    permissions:
      discussions: read
    steps:
      - name: "Download Discussions"
        uses: dotnet/issue-labeler/download@98f1d9b85686147ffdc155547cdd3469546c4e26 # v2.1.0
        with:
          type: "discussions"
          cache_key: ${{ env.CACHE_KEY }}
          repository: ${{ env.REPOSITORY }}
          label_prefix: ${{ env.LABEL_PREFIX }}
          limit: ${{ env.LIMIT }}
          page_size: ${{ env.PAGE_SIZE }}
          page_limit: ${{ env.PAGE_LIMIT }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

  check-issues-data:
    if: ${{ always() && contains(fromJSON('["All", "Issues"]'), github.event.inputs.type) && contains(fromJSON('["All", "Train Model", "Test Model"]'), github.event.inputs.steps) && contains(fromJSON('["success", "skipped"]'), needs.download-issues.result) }}
    runs-on: ubuntu-latest
    permissions: {}
    needs: download-issues
    outputs:
      has_training_data: ${{ steps.check.outputs.has_training_data }}
    steps:
      - name: "Restore Issue Data from Cache"
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: labeler-cache/issues-data.tsv
          key: issue-labeler/data/issues/${{ env.CACHE_KEY }}
          fail-on-cache-miss: true

      - name: "Check Issue Training Data"
        id: check
        shell: bash
        run: |
          line_count=$(wc -l < labeler-cache/issues-data.tsv)
          if [[ "$line_count" -ge 10 ]]; then
            echo "has_training_data=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_training_data=false" >> "$GITHUB_OUTPUT"
            echo "> [!NOTE]" >> "$GITHUB_STEP_SUMMARY"
            echo "> Issue training skipped because only $line_count line(s) were found in the downloaded TSV, and the trainer requires at least 10." >> "$GITHUB_STEP_SUMMARY"
          fi

  check-pulls-data:
    if: ${{ always() && contains(fromJSON('["All", "Pull Requests"]'), github.event.inputs.type) && contains(fromJSON('["All", "Train Model", "Test Model"]'), github.event.inputs.steps) && contains(fromJSON('["success", "skipped"]'), needs.download-pulls.result) }}
    runs-on: ubuntu-latest
    permissions: {}
    needs: download-pulls
    outputs:
      has_training_data: ${{ steps.check.outputs.has_training_data }}
    steps:
      - name: "Restore Pull Request Data from Cache"
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: labeler-cache/pulls-data.tsv
          key: issue-labeler/data/pulls/${{ env.CACHE_KEY }}
          fail-on-cache-miss: true

      - name: "Check Pull Request Training Data"
        id: check
        shell: bash
        run: |
          line_count=$(wc -l < labeler-cache/pulls-data.tsv)
          if [[ "$line_count" -ge 10 ]]; then
            echo "has_training_data=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_training_data=false" >> "$GITHUB_OUTPUT"
            echo "> [!NOTE]" >> "$GITHUB_STEP_SUMMARY"
            echo "> Pull request training skipped because only $line_count line(s) were found in the downloaded TSV, and the trainer requires at least 10." >> "$GITHUB_STEP_SUMMARY"
          fi

  check-discussions-data:
    if: ${{ always() && contains(fromJSON('["All", "Discussions"]'), github.event.inputs.type) && contains(fromJSON('["All", "Train Model", "Test Model"]'), github.event.inputs.steps) && contains(fromJSON('["success", "skipped"]'), needs.download-discussions.result) }}
    runs-on: ubuntu-latest
    permissions: {}
    needs: download-discussions
    outputs:
      has_training_data: ${{ steps.check.outputs.has_training_data }}
    steps:
      - name: "Restore Discussion Data from Cache"
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: labeler-cache/discussions-data.tsv
          key: issue-labeler/data/discussions/${{ env.CACHE_KEY }}
          fail-on-cache-miss: true

      - name: "Check Discussion Training Data"
        id: check
        shell: bash
        run: |
          line_count=$(wc -l < labeler-cache/discussions-data.tsv)
          if [[ "$line_count" -ge 10 ]]; then
            echo "has_training_data=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_training_data=false" >> "$GITHUB_OUTPUT"
            echo "> [!NOTE]" >> "$GITHUB_STEP_SUMMARY"
            echo "> Discussion training skipped because only $line_count line(s) were found in the downloaded TSV, and the trainer requires at least 10." >> "$GITHUB_STEP_SUMMARY"
          fi

  train-discussions:
    if: ${{ always() && contains(fromJSON('["All", "Discussions"]'), github.event.inputs.type) && contains(fromJSON('["All", "Train Model"]'), github.event.inputs.steps) && needs.check-discussions-data.outputs.has_training_data == 'true' && contains(fromJSON('["success", "skipped"]'), needs.download-discussions.result) }}
    runs-on: ubuntu-latest
    permissions: {}
    needs:
      - download-discussions
      - check-discussions-data
    steps:
      - name: "Train Model for Discussions"
        uses: dotnet/issue-labeler/train@98f1d9b85686147ffdc155547cdd3469546c4e26 # v2.1.0
        with:
          type: "discussions"
          data_cache_key: ${{ env.CACHE_KEY }}
          model_cache_key: ${{ env.CACHE_KEY }}

  train-issues:
    if: ${{ always() && contains(fromJSON('["All", "Issues"]'), github.event.inputs.type) && contains(fromJSON('["All", "Train Model"]'), github.event.inputs.steps) && needs.check-issues-data.outputs.has_training_data == 'true' && contains(fromJSON('["success", "skipped"]'), needs.download-issues.result) }}
    runs-on: ubuntu-latest
    permissions: {}
    needs:
      - download-issues
      - check-issues-data
    steps:
      - name: "Train Model for Issues"
        uses: dotnet/issue-labeler/train@98f1d9b85686147ffdc155547cdd3469546c4e26 # v2.1.0
        with:
          type: "issues"
          data_cache_key: ${{ env.CACHE_KEY }}
          model_cache_key: ${{ env.CACHE_KEY }}

  train-pulls:
    if: ${{ always() && contains(fromJSON('["All", "Pull Requests"]'), github.event.inputs.type) && contains(fromJSON('["All", "Train Model"]'), github.event.inputs.steps) && needs.check-pulls-data.outputs.has_training_data == 'true' && contains(fromJSON('["success", "skipped"]'), needs.download-pulls.result) }}
    runs-on: ubuntu-latest
    permissions: {}
    needs:
      - download-pulls
      - check-pulls-data
    steps:
      - name: "Train Model for Pull Requests"
        uses: dotnet/issue-labeler/train@98f1d9b85686147ffdc155547cdd3469546c4e26 # v2.1.0
        with:
          type: "pulls"
          data_cache_key: ${{ env.CACHE_KEY }}
          model_cache_key: ${{ env.CACHE_KEY }}

  test-issues:
    if: ${{ always() && contains(fromJSON('["All", "Issues"]'), github.event.inputs.type) && contains(fromJSON('["All", "Test Model"]'), github.event.inputs.steps) && needs.check-issues-data.outputs.has_training_data == 'true' && contains(fromJSON('["success", "skipped"]'), needs.train-issues.result) }}
    runs-on: ubuntu-latest
    permissions:
      issues: read
    needs:
      - check-issues-data
      - train-issues
    steps:
      - name: "Test Model for Issues"
        uses: dotnet/issue-labeler/test@98f1d9b85686147ffdc155547cdd3469546c4e26 # v2.1.0
        with:
          type: "issues"
          cache_key: ${{ env.CACHE_KEY }}
          repository: ${{ env.REPOSITORY }}
          label_prefix: ${{ env.LABEL_PREFIX }}
          threshold: ${{ env.THRESHOLD_ISSUES }}
          limit: ${{ env.LIMIT }}
          page_size: ${{ env.PAGE_SIZE }}
          page_limit: ${{ env.PAGE_LIMIT }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

  test-discussions:
    if: ${{ always() && contains(fromJSON('["All", "Discussions"]'), github.event.inputs.type) && contains(fromJSON('["All", "Test Model"]'), github.event.inputs.steps) && needs.check-discussions-data.outputs.has_training_data == 'true' && contains(fromJSON('["success", "skipped"]'), needs.train-discussions.result) }}
    runs-on: ubuntu-latest
    permissions:
      discussions: read
    needs:
      - check-discussions-data
      - train-discussions
    steps:
      - name: "Test Model for Discussions"
        uses: dotnet/issue-labeler/test@98f1d9b85686147ffdc155547cdd3469546c4e26 # v2.1.0
        with:
          type: "discussions"
          cache_key: ${{ env.CACHE_KEY }}
          repository: ${{ env.REPOSITORY }}
          label_prefix: ${{ env.LABEL_PREFIX }}
          threshold: ${{ env.THRESHOLD_DISCUSSIONS }}
          limit: ${{ env.LIMIT }}
          page_size: ${{ env.PAGE_SIZE }}
          page_limit: ${{ env.PAGE_LIMIT }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

  test-pulls:
    if: ${{ always() && contains(fromJSON('["All", "Pull Requests"]'), github.event.inputs.type) && contains(fromJSON('["All", "Test Model"]'), github.event.inputs.steps) && needs.check-pulls-data.outputs.has_training_data == 'true' && contains(fromJSON('["success", "skipped"]'), needs.train-pulls.result) }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    needs:
      - check-pulls-data
      - train-pulls
    steps:
      - name: "Test Model for Pull Requests"
        uses: dotnet/issue-labeler/test@98f1d9b85686147ffdc155547cdd3469546c4e26 # v2.1.0
        with:
          type: "pulls"
          cache_key: ${{ env.CACHE_KEY }}
          repository: ${{ env.REPOSITORY }}
          label_prefix: ${{ env.LABEL_PREFIX }}
          threshold: ${{ env.THRESHOLD_PULLS }}
          limit: ${{ env.LIMIT }}
          page_size: ${{ env.PAGE_SIZE }}
          page_limit: ${{ env.PAGE_LIMIT }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
